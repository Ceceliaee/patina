<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Patina</title>
    <style>
      body {
        box-sizing: border-box;
        min-width: 260px;
        margin: 0;
        padding: 14px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1d1d1f;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 15px;
      }
      #status {
        margin: 0 0 12px;
        color: #62656c;
        font-size: 12px;
        line-height: 1.5;
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      button {
        flex: 1;
        min-height: 32px;
        border: 1px solid #d5d6db;
        border-radius: 8px;
        background: #fff;
        font: inherit;
        font-size: 12px;
        font-weight: 650;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Patina 网页记录</h1>
    <p id="status">读取状态中...</p>
    <div class="actions">
      <button id="send-tab" type="button">同步当前页</button>
      <button id="options" type="button">设置</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
